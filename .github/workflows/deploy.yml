name: Deploy to GitHub Pages and Netlify

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy-pages:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Build for GitHub Pages
        run: npm run build
        env:
          VITE_BASE_PATH: "/"
          VITE_SUPABASE_URL: https://udtsqklwrsrmwyeriizu.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVkdHNxa2x3cnNybXd5ZXJpaXp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDI0OTYsImV4cCI6MjA5MTIxODQ5Nn0.FkigjybMiRgfUd4sWNGAR9eOZUOVImlNnQElNJRrfOk
          VITE_SUPABASE_PROJECT_ID: udtsqklwrsrmwyeriizu

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - uses: actions/deploy-pages@v4
        id: deployment

  deploy-netlify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Build for Netlify
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://udtsqklwrsrmwyeriizu.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVkdHNxa2x3cnNybXd5ZXJpaXp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDI0OTYsImV4cCI6MjA5MTIxODQ5Nn0.FkigjybMiRgfUd4sWNGAR9eOZUOVImlNnQElNJRrfOk
          VITE_SUPABASE_PROJECT_ID: udtsqklwrsrmwyeriizu

      - name: Deploy to Netlify
        run: npx netlify-cli deploy --prod --dir=dist --site=${{ secrets.NETLIFY_SITE_ID }} --auth=${{ secrets.NETLIFY_AUTH_TOKEN }}
